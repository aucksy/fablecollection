name: build

on:
  push:
    branches: [main]
    tags: ['*-v*']          # per-product tags, e.g. arclight-v0.1.0
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.9'

      - name: Validate Watch Face Format XML
        run: |
          set -e
          curl -sL -o wff-validator.jar \
            https://github.com/google/watchface/releases/download/latest/wff-validator.jar
          fail=0
          for xml in */app/src/main/res/raw/watchface.xml; do
            prod="${xml%%/*}"
            man="$prod/app/src/main/AndroidManifest.xml"
            ver=$(python3 - "$man" <<'PY'
import re,sys
t=open(sys.argv[1]).read()
m=re.search(r'format\.version.*?android:value="(\d+)"', t, re.S)
print(m.group(1) if m else "1")
PY
)
            echo "== Validating $xml against WFF version $ver =="
            java -jar wff-validator.jar "$ver" "$xml" || fail=1
          done
          [ $fail -eq 0 ] || { echo "::error::WFF validation failed — see log above"; exit 1; }

      - name: Build APK(s)
        run: |
          set -e
          mkdir -p out
          if [[ "$GITHUB_REF" == refs/tags/*-v* ]]; then
            # Release build: only the tagged product. Tag = <slug>-v<version>
            slug="${GITHUB_REF_NAME%%-v*}"
            dir=$(find . -maxdepth 1 -type d -iname "$slug" -printf '%f\n' | head -1)
            [ -n "$dir" ] || { echo "::error::no product dir for tag slug '$slug'"; exit 1; }
            echo "Releasing product '$dir' from tag '$GITHUB_REF_NAME'"
            (cd "$dir" && gradle assembleDebug --no-daemon --stacktrace)
            cp "$dir/app/build/outputs/apk/debug/app-debug.apk" "out/${GITHUB_REF_NAME}.apk"
          else
            # main push / manual: smoke-build every product (any top-level Gradle project)
            for f in */settings.gradle; do
              d=$(dirname "$f")
              slug=$(echo "$d" | tr '[:upper:]' '[:lower:]')
              echo "Building product '$d'"
              (cd "$d" && gradle assembleDebug --no-daemon --stacktrace)
              cp "$d/app/build/outputs/apk/debug/app-debug.apk" "out/${slug}-${GITHUB_REF_NAME}.apk"
            done
          fi
          ls -la out

      - uses: actions/upload-artifact@v4
        with:
          name: apks
          path: out/*.apk

      - name: Release (per-product tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: out/*.apk
          generate_release_notes: true
